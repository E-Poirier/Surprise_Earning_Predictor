services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./models:/app/models
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: frontend
    ports:
      - "5173:5173"
    env_file:
      - .env
    environment:
      # Vite dev server proxies /api → backend (service DNS name on the compose network)
      VITE_API_PROXY_TARGET: http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
